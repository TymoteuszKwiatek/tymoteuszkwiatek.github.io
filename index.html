<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja Strona 🌿</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#121a12; color:#c7f0c7; }
header { background:#1b451b; padding:20px; text-align:center; }
header h1 { margin:0; color:#7fff7f; }
nav { display:flex; justify-content:center; background:#1a2b1a; padding:5px; }
nav a { padding:10px 15px; color:#c7f0c7; text-decoration:none; transition:.3s; }
nav a:hover { background:#225522; }
section { max-width:900px; margin:20px auto; padding:20px; background:#1c2a1c; border-radius:10px; box-shadow:0 4px 6px rgba(0,0,0,.5); }
h2 { color:#7fff7f; margin-top:0; }
.cards-container { display:flex; overflow-x:auto; gap:10px; padding-bottom:10px; }
.card { flex:0 0 auto; padding:10px 15px; background:#254225; border-radius:8px; cursor:pointer; color:#a0ffa0; transition:.3s; white-space:nowrap; }
.card:hover { background:#3a7d3a; }
.search-box { width:100%; padding:8px; margin-bottom:15px; border-radius:5px; border:none; font-size:1em; }
footer { text-align:center; padding:10px; background:#1a2b1a; }
</style>
</head>
<body>

<header>
<h1>Moja Strona 🌿</h1>
</header>

<section>
<h2>Przepisy 🍲</h2>
<input type="text" id="search" class="search-box" placeholder="Szukaj przepisu...">
<div class="cards-container" id="cards-container"></div>
</section>

<footer>&copy; 2026 Moja Strona – Wszystko w jednym miejscu!</footer>

<script>
const user = "tymoteuszkwiatek";
const repo = "tymoteuszkwiatek.github.io";
let releases = [];

// Pobranie release
async function fetchReleases() {
  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/releases`);
  releases = await res.json();
  displayCards(releases);
}

// Tworzenie kart
function displayCards(list){
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  list.forEach(rel => {
    if(rel.tag_name.toLowerCase().includes('przepis')){
      const card = document.createElement('div');
      card.className = 'card';
      card.textContent = rel.name;
      card.onclick = () => {
        window.location.href = `przepis.html?name=${encodeURIComponent(rel.name)}`;
      }
      container.appendChild(card);
    }
  });
}

// Szukaj
document.getElementById('search').addEventListener('input', e => {
  const value = e.target.value.toLowerCase();
  const filtered = releases.filter(r => r.tag_name.toLowerCase().includes('przepis') && r.name.toLowerCase().includes(value));
  displayCards(filtered);
});

fetchReleases();
</script>

</body>
</html>
