<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moja Strona 🌿</title>

<style>
:root {
  --bg: #0f1410;
  --card: rgba(30, 50, 30, 0.6);
  --accent: #4cff88;
  --text: #d2ffd2;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a2a1a, #0f1410);
  color: var(--text);
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px 20px;
}

header h1 {
  margin: 0;
  font-size: 2.2em;
  color: var(--accent);
  text-shadow: 0 0 10px #4cff8855;
}

/* SECTION */
section {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 1em;
  margin-bottom: 20px;
  background: #1c2a1c;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  padding: 15px;
  border-radius: 15px;
  background: var(--card);
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
  font-weight: bold;
  border: 1px solid rgba(100,255,150,0.1);
}

.card:hover {
  transform: translateY(-5px) scale(1.03);
  background: rgba(50, 80, 50, 0.8);
  box-shadow: 0 0 15px #4cff8855;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
  font-size: 0.9em;
}
</style>
</head>

<body>

<header>
  <h1>🌿 Przepisy</h1>
</header>

<section>
  <input class="search" id="search" placeholder="Szukaj przepisu...">

  <div class="grid" id="grid"></div>
</section>

<footer>
  © 2026 • clean & simple
</footer>

<script>
const user = "tymoteuszkwiatek";
const repo = "tymoteuszkwiatek.github.io";

let releases = [];

async function fetchData() {
  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/releases`);
  releases = await res.json();
  render(releases);
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(rel => {
    if(rel.tag_name.toLowerCase().includes("przepis")){
      const div = document.createElement("div");
      div.className = "card";
      div.textContent = rel.name;

      div.onclick = () => {
        window.location.href = `przepis.html?name=${encodeURIComponent(rel.name)}`;
      };

      grid.appendChild(div);
    }
  });
}

// search
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  const filtered = releases.filter(r =>
    r.tag_name.toLowerCase().includes("przepis") &&
    r.name.toLowerCase().includes(val)
  );
  render(filtered);
});

fetchData();
</script>

</body>
</html>
