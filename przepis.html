<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Przepis 🌿</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f1410;
  color: #d2ffd2;
}

header {
  text-align: center;
  padding: 30px;
  color: #4cff88;
}

section {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.content {
  background: rgba(30,50,30,0.7);
  padding: 20px;
  border-radius: 15px;
  line-height: 1.6;
  backdrop-filter: blur(10px);
}

.files a {
  display: inline-block;
  margin: 5px;
  padding: 6px 12px;
  background: #2e6b3f;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.2s;
}

.files a:hover {
  background: #4cff88;
  color: black;
}

.back {
  display: inline-block;
  margin-top: 15px;
  color: #4cff88;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1 id="title">Ładowanie...</h1>
</header>

<section>
  <div class="content" id="content"></div>
</section>

<script>
const user = "tymoteuszkwiatek";
const repo = "tymoteuszkwiatek.github.io";

const name = new URLSearchParams(window.location.search).get("name");

async function load(){
  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/releases`);
  const data = await res.json();

  const rel = data.find(r => r.name === name);

  if(!rel){
    document.getElementById("content").innerHTML = "Nie znaleziono.";
    return;
  }

  document.getElementById("title").textContent = rel.name;

  document.getElementById("content").innerHTML = `
    ${rel.body.replace(/\n/g,"<br>")}
    <div class="files">
      ${rel.assets.map(a => `<a href="${a.browser_download_url}">${a.name}</a>`).join("")}
    </div>
    <a class="back" href="index.html">← Wróć</a>
  `;
}

load();
</script>

</body>
</html>
